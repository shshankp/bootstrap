<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
.form-box{
    width:600px;
    margin:auto;
}
</style>
  </head>
  <body>
<br>
<br>
<br>
<br>
<div class="form-box">
    <form >
      <div class="row mb-4">
<label class="col-sm-2 col-form-label">Name</label>
<input type="text" class="col form-control" placeholder="Enter Name">
</div>

<div class="row mb-4">
<label class="col-sm-2 col-form-label">Phone</label>
<input type="tel" class="col form-control" placeholder="Enter Phone Number">
</div>

        <div class="row mb-4">
            <label class="col-sm-2 col-form-label">Email Address</label>
            <input type="Email" class="col form-control" placeholder="Enter Email">
        </div>
        <div class="row mb-4">
            <label class="col-sm-2 col-form-label">Password</label>
            <input type="password" class="col form-control" placeholder="Enter Password">
        </div>
                <div class="row mb-4">
            <label class="col-sm-2 col-form-label">City</label>
            <select class="col form-select" >
                <option selected>Select a city</option>
                <option value="Noida">Noida</option>
                <option value="Delhi">Delhi</option>
                <option value="Ghaziabad">Ghaziabad</option>
            </select>
        </div><div class="row">
<div class="col-sm-2"></div>
<div class="col">
<button type="submit" class="btn btn-primary">Submit</button>
</div>
</div>
    </form>
</div>
        <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
