<!doctype html>
<html>
<head>
  <title>Bootstrap Grid</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-3">
  <div class="row">

    <!-- Column 1 -->
    <div class="col-md-4 bg-primary text-white p-3">
      Column 1
    </div>

    <!-- Column 2 with Nested Grid -->
    <div class="col-md-4 bg-warning p-3">
      Column 2

      <div class="row mt-2">
        <div class="col-6 bg-dark text-white p-2">
          Nested 1
        </div>
        <div class="col-6 bg-success text-white p-2">
          Nested 2
        </div>
      </div>

    </div>

    <!-- Column 3 -->
    <div class="col-md-4 bg-danger text-white p-3">
      Column 3
    </div>

  </div>
</div>    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


</body>
</html>
